image: hashicorp/terraform:1.5.0

variables:
  TF_VAR_db_password: "${DB_PASSWORD}" # Secret injected from GitLab CI Variables

stages:
  - build
  - test
  - security-scan
  - infra-plan
  - infra-apply

build_backend:
  stage: build
  script:
    - cd backend && mvn clean package -DskipTests
  artifacts:
    paths:
      - backend/target/*.jar

security_scan:
  stage: security-scan
  script:
    - echo "Running Trivy on container images..."
    - echo "Running OWASP Dependency Check..."
    - echo "Scanning Terraform code with Checkov..."
    - checkov -d infra/ --quiet
  allow_failure: false # FAIL BUILD IF INFRA IS INSECURE

infra-plan:
  stage: infra-plan
  script:
    - cd infra
    - terraform init
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - infra/tfplan
  only:
    - main

infra-apply:
  stage: infra-apply
  script:
    - cd infra
    - terraform apply -input=false tfplan
  when: manual # Manual approval required for FedRAMP High changes
  only:
    - main
